        /**
         * 呼叫 Google Apps Script 發送成績 (fetch)
         */
        async function submitScoreToGoogle(scoreData) {
            if (!GOOGLE_SCRIPT_URL) {
                console.log("未設定 GOOGLE_SCRIPT_URL，略過成績上傳");
                return;
            }

            // UI 顯示上傳中
            els.result.uploadStatus.classList.remove('hidden');
            els.result.uploadStatus.innerHTML = '<span class="text-sky-600 animate-pulse">⏳ 成績同步至雲端中...</span>';

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    // 將物件轉為字串，並設定 Content-Type 為 text/plain 避免觸發 CORS 預檢請求(Preflight)
                    body: JSON.stringify(scoreData),
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    }
                });

                const result = await response.json();
                if (result.status === 'success') {
                    els.result.uploadStatus.innerHTML = '<span class="text-emerald-600">✅ 成績已自動記錄給老師</span>';
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error('成績上傳失敗:', error);
                els.result.uploadStatus.innerHTML = '<span class="text-rose-500">⚠️ 同步失敗，請截圖本畫面回報</span>';
            }
        }

        /**
         * 陣列洗牌工具函數 (Fisher-Yates Shuffle)
         */
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

            state.wrongHistory = []; // 清空本次測驗的錯題紀錄
            state.isAnswering = false;

            // 1. 決定題庫並打亂「題目順序」
            const currentBankData = QUESTION_BANKS[state.selectedBank].data;
            const sourceQuestions = retryMode ? state.lastWrongHistory : currentBankData;
            state.activeQuestions = shuffleArray(sourceQuestions);

            // 2. 更新 UI 狀態
            els.quiz.modeBadge.textContent = retryMode ? '錯題重做' : QUESTION_BANKS[state.selectedBank].name;
            els.quiz.modeBadge.className = retryMode 
                ? 'bg-rose-100 text-rose-700 text-xs font-bold px-3 py-1 rounded-full'
                : 'bg-indigo-100 text-indigo-700 text-xs font-bold px-3 py-1 rounded-full';
            
            els.quiz.totalNum.textContent = state.activeQuestions.length;

            showSection('quiz');
            renderQuestion();
        }

        /**
         * 渲染單一題目
         */
        function renderQuestion() {
            state.isAnswering = false;
            const currentQ = state.activeQuestions[state.currentQIndex];
            
            // 更新進度
            els.quiz.currentNum.textContent = state.currentQIndex + 1;
            els.quiz.questionText.textContent = currentQ.q;

            // 處理選項打亂與追蹤正確答案索引
            // 將原選項映射成帶有原始索引的物件陣列
            const optionsWithOriginalIndex = currentQ.opts.map((optText, index) => ({
                text: optText,
                originalIndex: index
            }));

            // 打亂「選項順序」
            const shuffledOptions = shuffleArray(optionsWithOriginalIndex);

            // 清空舊選項
            els.quiz.optionsContainer.innerHTML = '';

            // 產生按鈕
            shuffledOptions.forEach((opt, idx) => {
                const btn = document.createElement('button');
                // 預設樣式：灰色邊框、hover轉淺藍
                btn.className = 'w-full text-left p-4 rounded-xl border-2 border-slate-200 hover:border-medical hover:bg-medical-light text-slate-700 font-medium transition-all duration-200 group relative';
                
                // 選項文字排版 (加入 A, B, C, D 標籤視覺效果，不影響邏輯)
                const labels = ['A', 'B', 'C', 'D'];
                btn.innerHTML = `
                    <div class="flex items-center gap-3 pointer-events-none">
                        <span class="flex-shrink-0 w-8 h-8 rounded-lg bg-slate-100 text-slate-500 flex items-center justify-center font-bold text-sm group-hover:bg-medical group-hover:text-white transition-colors">${labels[idx]}</span>
                        <span class="flex-grow">${opt.text}</span>
                    </div>
                `;

                // 綁定點擊事件
                btn.onclick = () => handleAnswerSelect(btn, opt.originalIndex, currentQ);
                els.quiz.optionsContainer.appendChild(btn);
            });
        }

        /**
         * 處理作答邏輯
         */
        function handleAnswerSelect(btnElement, selectedOriginalIndex, currentQObj) {
            if (state.isAnswering) return; // 防連點
            state.isAnswering = true;

            const isCorrect = selectedOriginalIndex === currentQObj.ansIndex;

            // 1. UI 反饋 (點擊後無論對錯皆變藍色標記，不提示對錯)
            // 移除所有按鈕的 hover 效果並鎖定
            const allBtns = els.quiz.optionsContainer.querySelectorAll('button');
            allBtns.forEach(b => {
                b.classList.remove('hover:border-medical', 'hover:bg-medical-light');
                b.classList.add('opacity-70', 'cursor-not-allowed');
                b.onclick = null; // 移除事件
            });

            // 針對選中的按鈕套用「已選擇」的藍色樣式
            btnElement.classList.remove('border-slate-200', 'opacity-70');
            btnElement.classList.add('border-medical', 'bg-medical-light', 'ring-2', 'ring-medical', 'ring-opacity-50', 'opacity-100');
            const labelSpan = btnElement.querySelector('span');
            labelSpan.classList.remove('bg-slate-100', 'text-slate-500');
            labelSpan.classList.add('bg-medical', 'text-white');

            // 2. 紀錄錯題
            if (!isCorrect) {
                state.wrongHistory.push(currentQObj);
            }

            // 3. 延遲 400 毫秒進入下一題
            setTimeout(() => {
                if (state.currentQIndex < state.activeQuestions.length - 1) {
                    state.currentQIndex++;
                    renderQuestion();
                } else {
                    finishQuiz();
                }
            }, 400);
        }

        /**
         * 測驗結束結算
         */
        function finishQuiz() {
            // 保存這次的錯題清單給重做按鈕使用
            state.lastWrongHistory = [...state.wrongHistory];

            const totalQ = state.activeQuestions.length;
            const wrongCount = state.wrongHistory.length;
            const correctCount = totalQ - wrongCount;
            const scorePercent = Math.round((correctCount / totalQ) * 100);

            // 渲染基本資訊
            els.result.name.textContent = state.studentName;
            els.result.id.textContent = state.studentId;
            els.result.score.textContent = scorePercent;
            els.result.correctCount.textContent = correctCount;
            els.result.wrongCount.textContent = wrongCount;

            // 隱藏/重置上一次的 API 狀態 UI
            els.result.uploadStatus.classList.add('hidden');
            els.result.uploadStatus.innerHTML = '';

            // 渲染動態標籤
            if(els.result.bankTag) els.result.bankTag.textContent = QUESTION_BANKS[state.selectedBank].name;
            els.result.modeTag.textContent = state.isRetryMode ? '錯題重做得分' : '完整測驗得分';
            els.result.modeTag.className = state.isRetryMode 
                ? 'bg-rose-100 text-rose-700 text-xs font-bold px-3 py-1 rounded-full'
                : 'bg-indigo-100 text-indigo-700 text-xs font-bold px-3 py-1 rounded-full';
            
            els.result.countTag.textContent = `測驗次數：第 ${state.quizCount} 次`;

            // 根據分數給予鼓勵語
            let msgHTML = '';
            if (scorePercent === 100) {
                msgHTML = '🎉 完美無瑕！你的免疫學知識堅不可摧！';
                els.result.msg.className = 'mt-8 p-4 bg-emerald-50 rounded-xl text-center text-lg font-bold text-emerald-700 border border-emerald-200';
            } else if (scorePercent >= 80) {
                msgHTML = '👍 表現優異！你已經掌握了大部分的核心概念！';
                els.result.msg.className = 'mt-8 p-4 bg-sky-50 rounded-xl text-center text-lg font-bold text-sky-700 border border-sky-200';
            } else if (scorePercent >= 60) {
                msgHTML = '💪 再接再厲！基礎不錯，針對錯題複習會更好喔！';
                els.result.msg.className = 'mt-8 p-4 bg-amber-50 rounded-xl text-center text-lg font-bold text-amber-700 border border-amber-200';
            } else {
                msgHTML = '💡 請不要灰心！學習是循序漸進的，仔細看看錯題解析吧！';
                els.result.msg.className = 'mt-8 p-4 bg-rose-50 rounded-xl text-center text-lg font-bold text-rose-700 border border-rose-200';
            }
            els.result.msg.innerHTML = msgHTML;

            // 渲染錯題解析區塊
            if (wrongCount > 0) {
                els.result.wrongContainer.classList.remove('hidden');
                els.result.btnRetry.classList.remove('hidden');
                els.result.wrongList.innerHTML = '';

                state.wrongHistory.forEach((qObj, index) => {
                    const correctAnswerText = qObj.opts[qObj.ansIndex];
                    // 將解析中的換行符號轉為 <br>
                    const formattedExp = qObj.exp.replace(/\n/g, '<br>');

                    const item = document.createElement('div');
                    item.className = 'bg-slate-50 rounded-xl p-5 border border-slate-200';
                    item.innerHTML = `
                        <div class="font-bold text-slate-800 mb-2 flex gap-2">
                            <span class="text-rose-500">Q.</span>
                            <span>${qObj.q}</span>
                        </div>
                        <div class="text-emerald-700 bg-emerald-50 px-3 py-2 rounded-lg text-sm font-bold mb-3 inline-block border border-emerald-100">
                            正確解答：${correctAnswerText}
                        </div>
                        <div class="text-slate-600 text-sm leading-relaxed border-t border-slate-200 pt-3">
                            ${formattedExp}
                        </div>
                    `;
                    els.result.wrongList.appendChild(item);
                });
            } else {
                els.result.wrongContainer.classList.add('hidden');
                els.result.btnRetry.classList.add('hidden'); // 全對不顯示錯題重做
            }

            showSection('result');

            // 嚴格遵守：使用 scrollTop = 0 捲動置頂
            document.documentElement.scrollTop = 0;
            document.body.scrollTop = 0;

            // =====================================
            // ★ 將成績打包並傳送給 Google Apps Script
            // =====================================
            const scorePayload = {
                name: state.studentName,
                id: state.studentId,
                bank: QUESTION_BANKS[state.selectedBank].name,
                mode: state.isRetryMode ? '錯題重做' : '完整測驗',
                score: scorePercent,
                correct: correctCount,
                wrong: wrongCount,
                quizCount: state.quizCount
            };
            submitScoreToGoogle(scorePayload);
        }

        /**
         * 事件監聽綁定
         */
        els.login.form.addEventListener('submit', (e) => {
            e.preventDefault();
            const nameInput = els.login.name.value.trim();
            const idInput = els.login.id.value.trim();
            
            // 取得選取的題庫
            const selectedBankRadio = document.querySelector('input[name="quiz-bank"]:checked');

            if (nameInput && idInput && selectedBankRadio) {
                state.studentName = nameInput;
                state.studentId = idInput;
                state.selectedBank = selectedBankRadio.value;
                state.quizCount = 0; // 更換題庫或重新登入時重置次數
                
                // 顯示 Header 資訊
                if(els.header.bankName) els.header.bankName.textContent = QUESTION_BANKS[state.selectedBank].name;
                els.header.name.textContent = state.studentName;
                els.header.id.textContent = state.studentId;
                els.header.info.classList.remove('hidden');

                startQuiz(false); // 首次開始完整測驗
            }
        });

        els.result.btnRetry.addEventListener('click', () => {
            startQuiz(true); // 開始錯題重做
        });

        els.result.btnRestart.addEventListener('click', () => {
            startQuiz(false); // 重新完整測驗
        });

        if(els.result.btnHome) {
            els.result.btnHome.addEventListener('click', () => {
                showSection('login');
                // 將捲軸移至最上
                document.documentElement.scrollTop = 0;
                document.body.scrollTop = 0;
            });
        }

    </script>
</body>
</html>
